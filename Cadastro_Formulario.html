<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario</title>
</head>


<body>

    <!-- Titulo do formulario -->
    <div class="div-nome-empresa">
        <h1>AERO<span><img src="Imagens/aviao.png" alt="img-aviao" class="img-aviao"></span>VIAGENS</h1>
    </div>

    <!-- Titulo do formulario -->
    <h2>Ficha de Cadastro - Preencha as informações abaixo.</h2>


    <form action="">
        <!-- inicio do formulario  -->
        <label for="">Nome:</label>
        <input type="text" placeholder="Digite seu nome">
        <br><br>

        <label for="">Email:</label>
        <input type="email" placeholder="Digite seu email">
        <br><br>

        <label for=""> Endereço:</label>
        <input type="text" placeholder="Digite seu endereço">
        <br><br>

        <Label for="Cidade:">Cidade:</Label>
        <select name="Cidade" id="Cidade">
            <option value="Selecione a Cidade">Selecione a Cidade</option>
            <option value="São Paulo/SP">São Paulo/SP</option>
            <option value="Rio de Janeiro/RJ">Rio De Janeiro/RJ</option>

        </select>
        <br><br>

        <label for="Telefone:">Telefone:</label>
        <Select>
            <Option value="DDD">DDD</Option>
            <Option value="(11)">(11)</Option>
            <Option value="(12)">(12)</Option>
            <Option value="(13)">(13)</Option>
        </Select>
        <input type="number" placeholder="99999-9999">
        <br><br>

        <label for="Usuario:">Usuário:</label>
        <input type="email" placeholder="Entre com seu login">
        <br><br>


        <label for="">Senha:</label>
        <input type="password" placeholder="Digite sua senha">
        <br><br>

       <input type="submit" value="Finalizar minha inscrição">
        <input type="reset" value="Limpar Formulário">
        <button><a href="AeroViagens.html">Voltar Tela Inicial</a></button>
       
    </form>

</body>

</html>
